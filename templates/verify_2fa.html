<!DOCTYPE html>
<html>
<head>
    <title>2FA Verification - Egan Auth</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f4f9; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .card { background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); width: 300px; text-align: center; }
        input[type="text"] { width: 90%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 4px; text-align: center; font-size: 20px; letter-spacing: 5px; }
        button { width: 100%; padding: 10px; background-color: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; margin-top: 10px; }
        button:hover { background-color: #0056b3; }
        .error { color: red; font-size: 0.9em; }
    </style>
</head>
<body>
    <div class="card">
        <h2>Two-Factor Authentication</h2>
        <p style="font-size: 0.9em; color: #555;">Enter the 6-digit code from your authenticator app for <strong>{{ username }}</strong>.</p>
        
        {% if error_message %} <p class="error">{{ error_message }}</p> {% endif %}

        <form method="POST">
            <input type="text" name="totp_code" placeholder="000000" maxlength="6" autocomplete="off" required>
            <button type="submit">Verify Code</button>
        </form>
        <p style="margin-top: 15px;"><a href="/login" style="font-size: 0.8em; color: #007bff; text-decoration: none;">Cancel and return to login</a></p>
    </div>
</body>
</html>
