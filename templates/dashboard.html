<!DOCTYPE html>
<html>
<head>
    <title>Dashboard - Egan Auth</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f4f9; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .dashboard-card { background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); width: 450px; }
        h2 { margin-top: 0; color: #333; }
        .welcome-text { color: #555; margin-bottom: 20px; font-size: 1.1em; }
        
        .section { margin-bottom: 20px; border: 1px solid #ddd; border-radius: 6px; padding: 15px; }
        .section h3 { margin: 0 0 10px 0; font-size: 1em; color: #007bff; border-bottom: 1px solid #ddd; padding-bottom: 5px; }
        
        .setting-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .setting-label { font-weight: bold; color: #444; font-size: 0.95em; }
        .setting-status { color: #28a745; font-weight: bold; font-size: 0.9em; }
        .setting-status.disabled { color: #dc3545; }
        
        .action-btn { padding: 6px 12px; background-color: #f8f9fa; color: #333; border: 1px solid #ccc; border-radius: 4px; cursor: pointer; font-size: 0.85em; }
        .action-btn:hover { background-color: #e2e6ea; }
        
        .logout-btn { width: 100%; padding: 10px; background-color: #dc3545; color: white; border: none; border-radius: 4px; cursor: pointer; margin-top: 10px; font-size: 16px; font-weight: bold;}
        .logout-btn:hover { background-color: #c82333; }
    </style>
</head>
<body>
    <div class="dashboard-card">
        <h2>Security Dashboard</h2>
        <p class="welcome-text">Welcome back, <strong>{{ email }}</strong></p>
        
        <div class="section">
            <h3>Account Details</h3>
            <div class="setting-row">
                <span class="setting-label">Email Address</span>
                <span style="color: #666; font-size: 0.9em;">{{ email }}</span>
            </div>
            <div class="setting-row">
                <span class="setting-label">Password</span>
                
                <a href="/change_password"><button class="action-btn">Update</button></a>
                
            </div>
        </div>

        <div class="section">
            <h3>Multi-Factor Authentication</h3>
            <div class="setting-row">
                <span class="setting-label">Authenticator App (TOTP)</span>
                {% if has_totp %}
                    <span class="setting-status">Enabled ✓</span>
                {% else %}
                    <span class="setting-status disabled">Disabled ✗</span>
                {% endif %}
            </div>
            
            <div class="setting-row">
                <span class="setting-label">SMS Text Messaging</span>
                {% if phone %}
                    <span class="setting-status">Enrolled ({{ phone }})</span>
                {% else %}
                    <form action="/enroll_sms" method="POST" style="display:flex; gap:5px;">
                        <input type="text" name="phone_number" placeholder="+44 70000 000000" required style="padding: 4px; border: 1px solid #ccc; border-radius: 4px;">
                        <button type="submit" class="action-btn">Enroll</button>
                    </form>
                {% endif %}
            </div>
        </div>

        <form action="/logout" method="GET">
            <button type="submit" class="logout-btn">Log Out</button>
        </form>
    </div>
</body>
</html>
