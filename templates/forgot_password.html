<!DOCTYPE html>
<html>
<head>
    <title>Forgot Password - Egan Auth</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f4f9; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .card { background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); width: 300px; text-align: center; }
        input[type="email"] { width: 90%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 4px; }
        button { width: 100%; padding: 10px; background-color: #ff9800; color: white; border: none; border-radius: 4px; cursor: pointer; margin-top: 10px; }
        button:hover { background-color: #e68a00; }
        .message { color: green; font-size: 0.9em; margin-bottom:10px; }
    </style>
</head>
<body>
    <div class="card">
        <h2>Account Recovery</h2>
        <p style="font-size: 0.9em; color: #555;">Enter your email to receive a password reset link.</p>
        
        {% if message %} <p class="message">{{ message }}</p> {% endif %}

        <form method="POST">
            <input type="email" name="email" placeholder="example@gmail.com" required>
            <button type="submit">Send Reset Link</button>
        </form>
        <p style="margin-top: 15px;"><a href="/login" style="font-size: 0.8em; color: #007bff; text-decoration: none;">Back to Login</a></p>
    </div>
</body>
</html>
