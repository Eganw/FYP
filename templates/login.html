<!DOCTYPE html>
<html>
<head>
    <title>Login - Egan Auth</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f4f9; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .card { background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); width: 300px; text-align: center; }
        input[type="email"], input[type="text"], input[type="password"] {width: 90%;padding: 10px;margin: 10px 0;border: 1px solid #ccc;border-radius: 4px; box-sizing: border-box;  }
        button { width: 100%; padding: 10px; background-color: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; margin-top: 10px; }
        button:hover { background-color: #0056b3; }
        .error { color: red; font-size: 0.9em; }
        .success { color: green; font-size: 0.9em; }
        .show-pwd-container { text-align: left; margin-left: 5%; font-size: 0.9em; color: #555; display: flex; align-items: center; gap: 5px; }
    </style>
</head>
<body>
    <div class="card">
        <h2>Secure Login</h2>
        {% if error_message %} <p class="error">{{ error_message }}</p> {% endif %}
        {% if success_message %} <p class="success">{{ success_message }}</p> {% endif %}

        <form id="loginForm" method="POST">
            <input type="email" name="email" placeholder="Email Address (e.g. name@gmail.com)" required>
            
            <input type="password" id="pwdInput" placeholder="Password" required>
            
            <input type="hidden" id="challengeInput" value="{{ challenge }}">
            <input type="hidden" name="challenge_response" id="responseInput">
            
            <div class="show-pwd-container">
                <input type="checkbox" onclick="togglePassword()"> Show Password
            </div>

            <p style="text-align: right; margin: 0 5% 10px 0;"><a href="/forgot_password" style="font-size: 0.85em; color: #ff9800;">Forgot Password?</a></p>

            <button type="submit">Log In</button>
        </form>
        <p><a href="/register">Need an account? Register</a></p>
    </div>

    <script>
        function togglePassword() {
            var pwdField = document.getElementById("pwdInput");
            if (pwdField.type === "password") {
                pwdField.type = "text";
            } else {
                pwdField.type = "password";
            }
        }

        // --- R6: Challenge-Handshake Client Logic ---
        
        // Helper function to create SHA-256 hashes in JavaScript
        async function sha256(message) {
            const msgBuffer = new TextEncoder().encode(message);
            const hashBuffer = await crypto.subtle.digest('SHA-256', msgBuffer);
            const hashArray = Array.from(new Uint8Array(hashBuffer));
            return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
        }

        // Intercept the login button click
        document.getElementById('loginForm').addEventListener('submit', async function(event) {
            event.preventDefault(); // Stop the form from submitting immediately
            
            const pwd = document.getElementById('pwdInput').value;
            const challenge = document.getElementById('challengeInput').value;
            
            // 1. Emulate the CHAP Secret (SHA256 of password)
            const chapSecret = await sha256(pwd);
            
            // 2. Mathematically combine the secret with the server's challenge
            const finalResponse = await sha256(chapSecret + challenge);
            
            // 3. Put the safe hash into the hidden input
            document.getElementById('responseInput').value = finalResponse;
            
            // 4. DESTROY the plaintext password from the input field so it doesn't cross the network!
            document.getElementById('pwdInput').value = "";
            
            // 5. Finally, submit the safe data to the server
            this.submit();
        });
    </script>
</body>
</html>
