<!DOCTYPE html>
<html>
<head>
    <title>Login - Egan Auth</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f4f9; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .card { background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); width: 300px; text-align: center; }
        input[type="text"], input[type="password"] { width: 90%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 4px; }
        button { width: 100%; padding: 10px; background-color: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; margin-top: 10px; }
        button:hover { background-color: #0056b3; }
        .error { color: red; font-size: 0.9em; }
        .success { color: green; font-size: 0.9em; }
        .show-pwd-container { text-align: left; margin-left: 5%; font-size: 0.9em; color: #555; display: flex; align-items: center; gap: 5px; }
    </style>
</head>
<body>
    <div class="card">
        <h2>Secure Login</h2>
        {% if error_message %} <p class="error">{{ error_message }}</p> {% endif %}
        {% if success_message %} <p class="success">{{ success_message }}</p> {% endif %}

        <form method="POST">
            <input type="text" name="username" placeholder="Username" required>
            
            <input type="password" name="password" id="pwdInput" placeholder="Password" required>
            
            <div class="show-pwd-container">
                <input type="checkbox" onclick="togglePassword()"> Show Password
            </div>

            <button type="submit">Log In</button>
        </form>
        <p><a href="/register">Need an account? Register</a></p>
    </div>

    <script>
        function togglePassword() {
            var pwdField = document.getElementById("pwdInput");
            if (pwdField.type === "password") {
                pwdField.type = "text";
            } else {
                pwdField.type = "password";
            }
        }
    </script>
</body>
</html>
