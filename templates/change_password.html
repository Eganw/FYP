<!DOCTYPE html>
<html>
<head>
    <title>Change Password - Egan Auth</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f4f9; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .card { background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); width: 300px; text-align: center; }
        input[type="password"] { width: 90%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 4px; }
        button { width: 100%; padding: 10px; background-color: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; margin-top: 10px; }
        button:hover { background-color: #0056b3; }
        .error { color: red; font-size: 0.9em; margin-bottom: 10px; }
    </style>
</head>
<body>
    <div class="card">
        <h2>Change Password</h2>
        {% if error_message %} <p class="error">{{ error_message }}</p> {% endif %}

        <form id="changePwdForm" method="POST">
            <input type="password" id="oldPwdInput" placeholder="Current Password" required>
            
            <input type="password" name="new_password" placeholder="New Password" required>
            
            <input type="hidden" id="challengeInput" value="{{ challenge }}">
            <input type="hidden" name="challenge_response" id="responseInput">
            
            <button type="submit">Update Password</button>
        </form>
        <p style="margin-top: 15px;"><a href="/dashboard" style="font-size: 0.85em; color: #555; text-decoration: none;">Cancel</a></p>
    </div>

    <script>
        async function sha256(message) {
            const msgBuffer = new TextEncoder().encode(message);
            const hashBuffer = await crypto.subtle.digest('SHA-256', msgBuffer);
            const hashArray = Array.from(new Uint8Array(hashBuffer));
            return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
        }

        document.getElementById('changePwdForm').addEventListener('submit', async function(event) {
            event.preventDefault(); 
            
            const oldPwd = document.getElementById('oldPwdInput').value;
            const challenge = document.getElementById('challengeInput').value;
            
            // 1. Mathematically combine the OLD password with the challenge
            const chapSecret = await sha256(oldPwd);
            const finalResponse = await sha256(chapSecret + challenge);
            
            // 2. Put safe hash in the form
            document.getElementById('responseInput').value = finalResponse;
            
            // 3. Clear the plaintext old password before sending!
            document.getElementById('oldPwdInput').value = ""; 
            
            this.submit();
        });
    </script>
</body>
</html>
